name: Deploy to vocab-games-dev Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build with dev base path
        run: npm run build
        env:
          VITE_BASE: /vocab-games-dev/

      - name: Deploy to vocab-games-dev
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.DEV_DEPLOY_TOKEN }}
          external_repository: lingolearn-hue/vocab-games-dev
          publish_branch: gh-pages
          publish_dir: ./dist
